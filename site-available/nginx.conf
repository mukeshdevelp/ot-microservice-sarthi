# react app
[Unit]
Description=Frontend React App (serve)
After=network.target

[Service]
Type=simple
User=ubuntu
WorkingDirectory=/home/ubuntu/frontend
ExecStart=/home/ubuntu/.nvm/versions/node/v16.20.2/bin/serve -s build -l 3000
Restart=always
RestartSec=5
Environment=NODE_ENV=production
Environment=PATH=/home/ubuntu/.nvm/versions/node/v16.20.2/bin:/usr/bin:/bin

[Install]
WantedBy=multi-user.target


# attendacne api
[Unit]
Description=Attendance API Gunicorn Service
After=network.target

[Service]
User=ubuntu
Group=www-data
WorkingDirectory=/home/ubuntu/attendance/attendance_api

Environment="CONFIG_FILE=/home/ubuntu/attendance/attendance_api/config.yaml"
Environment="PYTHONUNBUFFERED=1"

ExecStart=/home/ubuntu/attendance/attendance_api/.venv/bin/gunicorn \
          app:app \
          --workers 4 \
          --bind 0.0.0.0:8081 \
          --log-config log.conf

Restart=always
RestartSec=5

[Install]
WantedBy=multi-user.target


# notification
[Unit]
Description=Notification Worker Service
After=network.target

[Service]
Type=simple
User=ubuntu
WorkingDirectory=/home/ubuntu/notification/notification-worker
Environment=NOTIFICATION_CONFIG=/home/ubuntu/notification/notification-worker/config.yaml
ExecStart=/home/ubuntu/notification/notification-worker/venv/bin/python notification_api.py --mode scheduled
Restart=always
RestartSec=5

[Install]
WantedBy=multi-user.target


# employee api
[Unit]
Description=Employee API
After=network.target

[Service]
Type=simple
User=ubuntu
WorkingDirectory=/home/ubuntu/employee/employee-api
ExecStart=nohup go run /home/ubuntu/employee/employee-api/main.go > api.log 2>&1 &

Restart=always
RestartSec=3

[Install]
WantedBy=multi-user.target

# nginx configuration
server {
    server_name otmicroservice.gaganawasthi.online;

    # =======================
    # FRONTEND (React)
    # =======================
    location / {
        proxy_pass http://10.0.3.250:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =======================
    # EMPLOYEE API
    # =======================
    location /api/v1/employee/ {
        proxy_pass http://10.0.2.75:8080/api/v1/employee/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # =======================
    # SALARY API
    # =======================
    location /api/v1/salary/ {
        proxy_pass http://10.0.2.75:8082/api/v1/salary/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # =======================
    # ATTENDANCE API
    # =======================
    location /api/v1/attendance/ {
        proxy_pass http://10.0.2.75:8081/api/v1/attendance/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/otmicroservice.gaganawasthi.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/otmicroservice.gaganawasthi.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = otmicroservice.gaganawasthi.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name otmicroservice.gaganawasthi.online;
    return 404; # managed by Certbot


}
