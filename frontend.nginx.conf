server {
    listen 443 ssl;
    server_name otmicroservice.gaganawasthi.online;

    ssl_certificate /etc/letsencrypt/live/otmicroservice.gaganawasthi.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/otmicroservice.gaganawasthi.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # FRONTEND (React)
    location / {
        proxy_pass http://10.0.4.81:3000/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # EMPLOYEE API
    location /api/v1/employee/ {
        proxy_pass http://10.0.11.191:8080/api/v1/employee/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # SALARY API
    location /api/v1/salary/ {
        proxy_pass http://10.0.11.191:8082/api/v1/salary/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ATTENDANCE API
    location /api/v1/attendance/ {
        proxy_pass http://10.0.11.191:8081/api/v1/attendance/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name otmicroservice.gaganawasthi.online;

    return 301 https://$host$request_uri;
}

